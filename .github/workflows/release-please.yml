name: release-please

# Conventional-commit driven releases. On every push to main, release-please keeps a
# "release PR" open with the generated changelog and the next semantic version. Merging
# that PR tags the release and (below) builds, attests and publishes to PyPI.
#
# A tag created by release-please uses GITHUB_TOKEN, which by design does NOT trigger the
# tag-based release.yml (anti-recursion). So this workflow does its own publish; release.yml
# remains as a manual-tag fallback.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain the release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build and publish to PyPI
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi  # the required-reviewer gate pauses here until a maintainer approves
    permissions:
      id-token: write  # Trusted Publishing + SLSA provenance (OIDC)
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]" build
      - name: Tests (a released commit must be green)
        run: pytest -q --cov=gbfs_toolkit --cov-fail-under=85
      - run: python -m build
      - uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: "dist/*"
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
