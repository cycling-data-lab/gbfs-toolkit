name: release-please

# Conventional-commit driven releases. On every push to main, release-please keeps a
# "release PR" open with the generated changelog and the next semantic version. Merging
# that PR tags the release and (below) builds, attests and publishes to PyPI.
#
# A tag created by release-please uses GITHUB_TOKEN, which by design does NOT trigger the
# tag-based release.yml (anti-recursion). So this workflow does its own publish; release.yml
# remains as a manual-tag fallback.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain the release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # Use a PAT (RELEASE_PLEASE_TOKEN) if set, so release-please can open the release
          # PR even when the org forbids GitHub Actions from creating PRs. Falls back to the
          # built-in token, which works once that org/repo setting is enabled instead.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build and publish to PyPI
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi  # the required-reviewer gate pauses here until a maintainer approves
    permissions:
      id-token: write  # Trusted Publishing + SLSA provenance (OIDC)
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]" build
      - name: Tests (a released commit must be green)
        run: pytest -q --cov=gbfs_toolkit --cov-fail-under=85
      - run: python -m build
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/*"
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
