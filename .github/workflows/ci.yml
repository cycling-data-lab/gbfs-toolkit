name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref (a new push to a PR stops the previous matrix).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-install:
    name: Core-only install (no extras)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      # Install the package with ONLY its core deps (numpy/scipy/pandas), then a
      # smoke import + the dependency-free test subset. This is the guard that a code
      # path silently needing an optional/transitive package (e.g. jinja2) fails here
      # instead of in a user's environment.
      - run: pip install -e . pytest
      - run: python -c "import gbfs_toolkit as gb; gb.audit_static; gb.format_paper_summary; print(gb.__version__)"
      # The dev extras (esda/lifelines) cap pandas < 3, so this no-extras install is the
      # ONLY job that runs on the latest pandas. Run the dependency-free test files here
      # so a pandas-major incompatibility is caught before release, not by a user.
      - run: >
          pytest -q
          tests/test_v160.py
          tests/test_v162_fixes.py
          tests/test_v170_consistency.py
          tests/test_v170_io_consistency.py
          tests/test_input_purity.py

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        # Also check the geospatial extras compile on Windows and macOS.
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Lint (ruff)
        if: runner.os == 'Linux'
        run: ruff check .
      - name: Format check (ruff)
        if: runner.os == 'Linux'
        run: ruff format --check .
      - name: Dependency hygiene (deptry)
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        run: deptry src
      - name: Tests
        run: pytest -q --cov=gbfs_toolkit --cov-report=term-missing --cov-fail-under=85
      - name: Doctests
        run: >
          pytest -q --doctest-modules
          src/gbfs_toolkit/interfaces/datasets.py
          src/gbfs_toolkit/analytics/frames.py
          src/gbfs_toolkit/analytics/temporal.py
          src/gbfs_toolkit/analytics/distribution.py
          src/gbfs_toolkit/analytics/dynamics.py
          src/gbfs_toolkit/analytics/resampling.py
          src/gbfs_toolkit/analytics/service.py
          src/gbfs_toolkit/analytics/agreement.py
          src/gbfs_toolkit/analytics/fleet.py
          src/gbfs_toolkit/analytics/clustering.py
          src/gbfs_toolkit/audit/static.py
          src/gbfs_toolkit/audit/dynamic.py
          src/gbfs_toolkit/audit/__init__.py
          src/gbfs_toolkit/audit/governance.py
          src/gbfs_toolkit/io/timeseries.py
          src/gbfs_toolkit/spatial/analytics.py
          src/gbfs_toolkit/spatial/geometry.py
      - name: Type check (mypy)
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        run: mypy
      - name: Docstring coverage (interrogate)
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        run: interrogate -c pyproject.toml src
      - name: Notebook execution (nbmake)
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        run: pytest --nbmake docs/notebooks/quickstart.ipynb

  min-versions:
    name: Minimum dependency versions (lowest-direct)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"
      - run: pip install uv
      # Resolve the LOWEST version of each declared dependency, so a use of a numpy/pandas
      # API newer than our floor (numpy>=1.26, pandas>=2.2) fails here instead of for a user
      # on an older but allowed stack.
      - run: uv pip install --system --resolution=lowest-direct -e . pytest pytest-benchmark
      - run: >
          pytest -q
          tests/test_v160.py tests/test_v162_fixes.py tests/test_v170_consistency.py
          tests/test_v170_io_consistency.py tests/test_input_purity.py
          tests/test_no_optional_dep_leak.py

  nightly-deps:
    name: Nightly numpy/pandas/scipy (informational)
    runs-on: ubuntu-latest
    continue-on-error: true  # an early warning of future breakage, not a gate
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: pip install -e . pytest pytest-benchmark
      - run: >
          pip install --pre --upgrade
          --extra-index-url https://pypi.anaconda.org/scientific-python-nightly-wheels/simple
          numpy pandas scipy
      - run: >
          pytest -q
          tests/test_v160.py tests/test_v162_fixes.py tests/test_v170_consistency.py
          tests/test_v170_io_consistency.py tests/test_input_purity.py
          tests/test_no_optional_dep_leak.py

  benchmarks:
    name: Benchmarks (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      # Run the suite and publish the results. Timings on shared runners are too noisy to
      # gate on, so this fails only if a benchmark errors or hangs (an O(n^2) regression);
      # download the artifact to inspect the numbers.
      - name: Run benchmarks
        run: pytest benchmarks/ --benchmark-only --benchmark-json=benchmark.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results
          path: benchmark.json

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/*
