name: Release

# Publish to PyPI on a version tag, via Trusted Publishing (no API token stored).
# Requires a one-time PyPI setup: project → Publishing → add this repo + workflow + environment.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test before publish (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q --cov=gbfs_toolkit --cov-fail-under=85
      - name: Doctests
        run: pytest -q --doctest-modules src/gbfs_toolkit/analytics src/gbfs_toolkit/audit
      - name: Type check
        if: matrix.python-version == '3.12'
        run: mypy

  build:
    name: Build distributions
    needs: test  # never build or publish a tag whose tests are red (a wheel cannot be unpublished)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # SLSA build provenance (OIDC)
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      # Cryptographic SLSA provenance binding the artifacts to this exact workflow run.
      - uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: "dist/*"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
