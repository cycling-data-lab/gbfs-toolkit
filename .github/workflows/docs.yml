name: Docs

# Versioned docs with mike, published to the gh-pages branch.
#   - push to main  -> the moving "dev" docs (/dev/)
#   - tag v*        -> the released minor (/1.5/) and the "latest" alias (the default)
# One-time: repo Settings → Pages → Source = "Deploy from a branch" → gh-pages.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

# Serialise gh-pages deploys: a main push and a tag push must not race to push the
# same branch (the loser is rejected with "fetch first").
concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[docs]"
      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Deploy development docs
        if: github.ref == 'refs/heads/main'
        run: mike deploy --push dev
      - name: Deploy released docs
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MINOR="${VERSION%.*}"
          mike deploy --push --update-aliases "$MINOR" latest
          mike set-default --push latest
