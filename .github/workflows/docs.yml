name: Docs

# Build the MkDocs site and publish it to the gh-pages branch on every push to main.
# One-time: repo Settings → Pages → Source = "Deploy from a branch" → gh-pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[docs]"
      - run: mkdocs gh-deploy --force
