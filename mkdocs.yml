site_name: gbfs-toolkit
site_description: Research-grade ingestion and semantic A1–A7 quality audit for GBFS bike-share feeds
site_author: Rohan Fossé, Gaël Pallares
site_url: https://cycling-data-lab.github.io/gbfs-toolkit/
repo_url: https://github.com/cycling-data-lab/gbfs-toolkit
repo_name: cycling-data-lab/gbfs-toolkit
edit_uri: edit/main/docs/
copyright: >-
  Copyright © 2026 Rohan Fossé and Gaël Pallares.
  CESI LINEACT (EA 7527), Montpellier, France. Released under the MIT License.

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
    logo: material/bike
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cycling-data-lab/gbfs-toolkit
      name: Source on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/gbfs-toolkit/
      name: gbfs-toolkit on PyPI
    - icon: fontawesome/brands/orcid
      link: https://orcid.org/0009-0002-2195-0198
      name: Rohan Fossé (ORCID)
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - include-markdown
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          inventories:
            - https://pandas.pydata.org/docs/objects.inv
            - https://numpy.org/doc/stable/objects.inv
            - https://docs.scipy.org/doc/scipy/objects.inv
          options:
            docstring_style: numpy
            docstring_section_style: table
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_signature_annotations: true
            signature_crossrefs: true
            separate_signature: true
            merge_init_into_class: true
            members_order: source
            group_by_category: true
            show_if_no_docstring: false
            filters:
              - "!^_"

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Guides:
      - Feature overview: guide.md
      - Examples:
          - examples.md
          - Audit a feed: examples/01-audit-a-feed.md
          - Collect a snapshot: examples/02-collect-a-snapshot.md
          - Analyse history: examples/03-analyze-history.md
          - Equity and coverage: examples/04-equity-and-coverage.md
          - Rigorous audit (robustness, CIs, FDR): examples/05-rigorous-audit.md
          - Equity, accessibility & rebalancing: examples/06-equity-rebalancing.md
          - Free-floating & ghost fleets (signature): examples/07-free-floating-fleets.md
          - Service reliability & outage survival: examples/08-service-reliability.md
          - Contextualize with transit & weather: examples/09-contextualize.md
          - Macro-scale comparative audit (live): examples/10-macro-scale-audit.md
  - Explanation:
      - Methodology: methodology.md
      - Glossary: glossary.md
      - Data model: data-model.md
  - Reference: reference/
  - Project:
      - Citing this work: citing.md
      - Contributing: contributing.md
      - Changelog: changelog.md
